<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>All Tools - myPDF</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/all-tools.css"
    >

</head>


<body>


    <header class="navbar">

        <a href="index.html" class="logo-container">

    <img
        src="assets/logo.jpg"
        alt="myPDF Logo"
        class="logo"
    >

    <span class="logo-text">
        myPDF
    </span>

</a>


       


        <nav class="nav-links">

            <a href="index.html">
                home
            </a>


            <a href="all-tools.html">
                all tools
            </a>


            <a href="about.html">
                about
            </a>


            <a href="settings.html">
                settings
            </a>

        </nav>


    </header>


    <main class="all-tools-container">

        <div class="tools-header">

           <h1>
                All PDF Tools
            </h1>


            <input
                type="text"
                id="tool-search"
                placeholder="Search for a PDF tool..."
         >

    </div>


        <section class="tools-library">


            <div class="tool-category">


                <h2>
                    PDF ORGANIZATION
                </h2>


                <div class="tool-grid">


                    <a
                        href="tools/merge.html"
                        class="tool-button"
                    >
                        Merge PDF
                    </a>


                    <a
                        href="tools/split.html"
                        class="tool-button"
                    >
                        Split PDF
                    </a>


                    <a
                        href="tools/rotate.html"
                        class="tool-button"
                    >
                        Rotate PDF
                    </a>


                    <a
                        href="tools/extract.html"
                        class="tool-button"
                    >
                        Extract PDF Pages
                    </a>


                    <a
                        href="tools/page-number.html"
                        class="tool-button"
                    >
                        Add Page Numbers
                    </a>


                </div>


            </div>


            <div class="tool-category">


                <h2>
                    PDF CONVERSION
                </h2>


                <div class="tool-grid">


                    <a
                        href="tools/pdf-to-txt.html"
                        class="tool-button"
                    >
                        PDF to TXT
                    </a>


                    <a
                        href="tools/pdf-to-jpg.html"
                        class="tool-button"
                    >
                        PDF to JPG
                    </a>


                    <a
                        href="tools/png-to-pdf.html"
                        class="tool-button"
                    >
                        PNG to PDF
                    </a>


                    <a
                        href="tools/word-to-pdf.html"
                        class="tool-button"
                    >
                        Word to PDF
                    </a>


                    <a
                        href="tools/ocr.html"
                        class="tool-button"
                    >
                        OCR PDF
                    </a>


                </div>


            </div>


            <div class="tool-category">


                <h2>
                    PDF SECURITY
                </h2>


                <div class="tool-grid">


                    <a
                        href="tools/protect-pdf.html"
                        class="tool-button"
                    >
                        Protect PDF
                    </a>


                    <a
                        href="tools/unlock-pdf.html"
                        class="tool-button"
                    >
                        Unlock PDF
                    </a>


                </div>


            </div>


        </section>


    </main>


    <script src="js/main.js"></script>

    <script src="js/theme.js"></script>

    <script src="js/all-tools.js"></script>


</body>

</html>
