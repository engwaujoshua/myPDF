<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Extract Images from PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            extract images from PDF
        </h1>


        <p>
            Extract images embedded inside a PDF document.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <button
            id="extract-button"
            disabled
        >
            extract images
        </button>


        <button
            id="download-all-button"
            style="display: none;"
        >
            download all images
        </button>


        <div id="image-results">
        </div>


    </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="../js/tools/extract-images.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
