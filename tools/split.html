<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Split PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>

<body>

<header class="navbar">

    <a href="../index.html">

        <img
            src="../assets/logo.jpg"
            alt="myPDF"
            class="logo">

    </a>

    <nav class="nav-links">

        <a href="../index.html">Home</a>

        <a href="../all-tools.html">All Tools</a>

        <a href="../about.html">About</a>

        <a href="../settings.html">Settings</a>

    </nav>

</header>


<main class="tool-container">

    <h1 class="tool-title">

        Split PDF

    </h1>

    <p class="tool-description">

        Split a PDF into individual pages or page ranges.

    </p>


    <div
        id="upload-area"
        class="upload-area">

        <div class="upload-icon">📄</div>

        <div class="upload-title">

            Drag & Drop a PDF here

        </div>

        <div class="upload-subtitle">

            or click to browse

        </div>

    </div>


    <input
        type="file"
        id="pdf-input"
        accept=".pdf"
        hidden>


    <div
        id="file-list"
        class="file-list">

    </div>


    <h3 class="input-label">

    Split Mode

</h3>

<div class="split-options">

    <label>

        <input
            type="radio"
            name="split-mode"
            value="all"
            checked>

        Every page into separate PDFs

    </label>

    <label>

        <input
            type="radio"
            name="split-mode"
            value="range">

        Custom page ranges

    </label>

</div>

<input
    id="page-range"
    class="text-input"
    type="text"
    placeholder="Example: 1-3,5,8-10"
    disabled>


    <button
        id="split-button"
        class="primary-action"
        disabled>

        Split PDF

    </button>

</main>


<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script src="../js/tools/split.js"></script>

<script src="../js/theme.js"></script>

</body>

</html>
