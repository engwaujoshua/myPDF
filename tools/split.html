<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Split PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            split PDF
        </h1>


        <p>
            Select pages from a PDF and create a new PDF.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <div id="page-list">
        </div>


        <button
            id="split-button"
            disabled
        >
            create new PDF
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/split.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
