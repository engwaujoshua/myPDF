<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PNG to PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            PNG to PDF
        </h1>


        <p>
            Convert PNG images into a PDF document.
        </p>


        <input
            type="file"
            id="image-files"
            accept="image/png"
            multiple
        >


        <div class="png-options">


            <label for="page-size">
                page size
            </label>


            <select id="page-size">

                <option value="fit">
                    fit image to page
                </option>

                <option value="a4">
                    A4
                </option>

                <option value="letter">
                    Letter
                </option>

            </select>


        </div>


        <div id="image-preview">
        </div>


        <button
            id="convert-button"
            disabled
        >
            convert to PDF
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/png-to-pdf.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
