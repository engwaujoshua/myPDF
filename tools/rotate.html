<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rotate PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            rotate PDF
        </h1>


        <p>
            Rotate all pages in a PDF document.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <div class="rotation-options">

            <label for="rotation-angle">
                rotation angle
            </label>


            <select id="rotation-angle">

                <option value="90">
                    90° clockwise
                </option>

                <option value="180">
                    180°
                </option>

                <option value="270">
                    90° counterclockwise
                </option>

            </select>

        </div>


        <button
            id="rotate-button"
            disabled
        >
            rotate PDF
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download rotated PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/rotate.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
