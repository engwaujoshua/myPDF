<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit PDF Metadata - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            edit PDF metadata
        </h1>


        <p>
            Edit information stored inside a PDF document.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <div class="metadata-form">


            <label>
                title

                <input
                    type="text"
                    id="pdf-title"
                >

            </label>


            <label>
                author

                <input
                    type="text"
                    id="pdf-author"
                >

            </label>


            <label>
                subject

                <input
                    type="text"
                    id="pdf-subject"
                >

            </label>


            <label>
                keywords

                <input
                    type="text"
                    id="pdf-keywords"
                >

            </label>


            <label>
                creator

                <input
                    type="text"
                    id="pdf-creator"
                >

            </label>


        </div>


        <button
            id="save-metadata-button"
            disabled
        >
            save metadata
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download updated PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/edit-metadata.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
