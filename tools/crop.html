<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crop PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            crop PDF
        </h1>


        <p>
            Crop the visible area of every page in a PDF.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <div class="crop-options">


            <label>
                top

                <input
                    type="number"
                    id="crop-top"
                    value="0"
                    min="0"
                >

            </label>


            <label>
                right

                <input
                    type="number"
                    id="crop-right"
                    value="0"
                    min="0"
                >

            </label>


            <label>
                bottom

                <input
                    type="number"
                    id="crop-bottom"
                    value="0"
                    min="0"
                >

            </label>


            <label>
                left

                <input
                    type="number"
                    id="crop-left"
                    value="0"
                    min="0"
                >

            </label>


        </div>


        <button
            id="crop-button"
            disabled
        >
            crop PDF
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download cropped PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/crop.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
