<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Merge PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>

<body>

<header class="navbar">

    <a href="../index.html">

        <img src="../assets/logo.jpg"
             alt="myPDF"
             class="logo">

    </a>

    <nav class="nav-links">

        <a href="../index.html">Home</a>

        <a href="../all-tools.html">All Tools</a>

        <a href="../about.html">About</a>

        <a href="../settings.html">Settings</a>

    </nav>

</header>


<main class="tool-container">

    <h1 class="tool-title">
        Merge PDF
    </h1>

    <p class="tool-description">

        Combine multiple PDF files into one document while keeping the order you choose.

    </p>


    <div
        id="upload-area"
        class="upload-area">

        <div class="upload-icon">
            📄
        </div>

        <div class="upload-title">

            Drag & Drop PDF files here

        </div>

        <div class="upload-subtitle">

            or click to browse

        </div>

    </div>


    <input
        type="file"
        id="pdf-input"
        accept=".pdf"
        multiple
        hidden>


    <div
        id="file-list"
        class="file-list">

    </div>


    <button
        id="merge-button"
        class="primary-action"
        disabled>

        Merge PDFs

    </button>


    <a
        id="download-link"
        style="display:none">

    </a>


</main>


<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script src="../js/tools/merge.js"></script>

<script src="../js/theme.js"></script>

</body>

</html>
