<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Word to PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"

            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            Word to PDF
        </h1>


        <p>
            Convert a Word document into a PDF file.
        </p>


        <input
            type="file"
            id="word-file"
            accept=".docx"
        >


        <button
            id="convert-button"
            disabled
        >
            convert to PDF
        </button>


        <div id="conversion-status">
        </div>


        <div
            id="document-preview"
            style="display: none;"
        >
        </div>


    </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="../js/tools/word-to-pdf.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
