<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF to TXT - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            PDF to TXT
        </h1>


        <p>
            Extract text from a PDF document.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <button
            id="extract-button"
            disabled
        >
            extract text
        </button>


        <textarea
            id="text-output"
            placeholder="Extracted text will appear here..."
            readonly
        ></textarea>


        <a
            id="download-link"
            style="display: none;"
        >
            download TXT file
        </a>


    </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="../js/tools/pdf-to-txt.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
