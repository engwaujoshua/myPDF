<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Name - PDF Tools</title>

    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>

<body>

<header class="navbar">
    <a href="/index.html" class="logo">PDF Tools</a>

    <nav class="nav-links">
        <a href="/index.html">Home</a>

        <div class="all-tools-wrapper">
            <a href="/all-tools.html">All Tools</a>
            <div class="tools-dropdown"></div>
        </div>

        <button class="send-button" aria-label="Send">
            <img src="/assets/icons/send.svg" alt="Send">
        </button>

        <a href="/about.html">About</a>
    </nav>

    <div class="nav-actions">
        <button id="dark-mode-toggle" aria-label="Toggle dark mode">
            <img id="dark-mode-icon" src="/assets/icons/moon.svg" alt="Dark Mode">
        </button>

        <a href="/login.html">Login</a>
        <a href="/signup.html" class="signup-button">Signup</a>
    </div>
</header>

<main class="page-content">
    <h1>Extract Pages</h1>

    <input type="file" id="pdf-file" accept="application/pdf">

    <input
        type="text"
        id="page-range"
        placeholder="Pages e.g. 1-3, 5"
    >

    <button id="extract-button" type="button">
        Extract Pages
    </button>

    <p id="extract-status"></p>
</main>

<footer class="footer">
    <p>&copy; 2026 PDF Tools. All rights reserved.</p>
</footer>

<script src="/js/darkmode.js"></script>
<script src="/js/navbar.js"></script>
<script src="/lib/pdf-lib.min.js"></script>
<script src="/js/tools-logic/remove-pages.js"></script>

</body>
</html>
