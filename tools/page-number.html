<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Page Numbers - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            page numbers
        </h1>


        <p>
            Add page numbers to your PDF document.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <div class="page-number-options">


            <label for="page-number-position">
                position
            </label>


            <select id="page-number-position">

                <option value="bottom-center">
                    bottom center
                </option>

                <option value="bottom-left">
                    bottom left
                </option>

                <option value="bottom-right">
                    bottom right
                </option>

                <option value="top-center">
                    top center
                </option>

            </select>


            <label for="starting-number">
                starting number
            </label>


            <input
                type="number"
                id="starting-number"
                value="1"
                min="1"
            >

        </div>


        <button
            id="page-number-button"
            disabled
        >
            add page numbers
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download numbered PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/page-numbers.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
