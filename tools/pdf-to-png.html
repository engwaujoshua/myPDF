<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF to PNG - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            PDF to PNG
        </h1>


        <p>
            Convert PDF pages into PNG images.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <div class="pdf-to-png-options">


            <label for="page-selection">
                pages
            </label>


            <select id="page-selection">

                <option value="all">
                    all pages
                </option>

                <option value="custom">
                    custom pages
                </option>

            </select>


            <input
                type="text"
                id="custom-pages"
                placeholder="Example: 1,3,5-7"
                style="display: none;"
            >


            <label for="image-scale">
                image quality
            </label>


            <select id="image-scale">

                <option value="2">
                    high
                </option>

                <option value="1.5">
                    medium
                </option>

                <option value="1">
                    low
                </option>

            </select>


        </div>


        <button
            id="convert-button"
            disabled
        >
            convert to PNG
        </button>


        <button
            id="download-all-button"
            style="display: none;"
        >
            download all PNGs
        </button>


        <div id="image-results">
        </div>


    </main>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script src="../js/tools/pdf-to-png.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
