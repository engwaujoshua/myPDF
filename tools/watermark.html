<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Watermark PDF - myPDF</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/tools.css">

</head>


<body>


    <header class="navbar">

        <a href="../index.html">

            <img
                src="../assets/logo.svg"
                alt="myPDF Logo"
                class="logo"
            >

        </a>


        <nav class="nav-links">

            <a href="../index.html">
                home
            </a>

            <a href="../all-tools.html">
                all tools
            </a>

            <a href="../about.html">
                about
            </a>

            <a href="../settings.html">
                settings
            </a>

        </nav>

    </header>


    <main class="tool-container">


        <h1>
            watermark PDF
        </h1>


        <p>
            Add text to every page of a PDF.
        </p>


        <input
            type="file"
            id="pdf-file"
            accept="application/pdf"
        >


        <input
            type="text"
            id="watermark-text"
            placeholder="Enter watermark text"
        >


        <div class="watermark-options">


            <label for="watermark-position">
                position
            </label>


            <select id="watermark-position">

                <option value="center">
                    center
                </option>

                <option value="top">
                    top
                </option>

                <option value="bottom">
                    bottom
                </option>

            </select>


            <label for="watermark-opacity">
                opacity
            </label>


            <input
                type="range"
                id="watermark-opacity"
                min="0.1"
                max="1"
                step="0.1"
                value="0.3"
            >

        </div>


        <button
            id="watermark-button"
            disabled
        >
            add watermark
        </button>


        <a
            id="download-link"
            style="display: none;"
        >
            download watermarked PDF
        </a>


    </main>


    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <script src="../js/tools/watermark.js"></script>

    <script src="../js/theme.js"></script>


</body>

</html>
